    <!-- ============================================================
         CACHE NUKER — corre UNA vez por usuario.
         Razón: hay navegadores con un Service Worker viejo instalado que
         intercepta fetches y devuelve JS cacheado ignorando los query
         strings ?v=. Esto dejaba a la gente ejecutando código de hace
         varios commits sin saberlo. Al detectar que no se ha nukeado
         todavía, desregistra SWs, borra Cache Storage, borra IndexedDB
         (la app volverá a bajar todo de Supabase, que tiene los HLCs
         frescos) y recarga. En recargas posteriores no hace nada.
         ============================================================ -->
    <script>
    (function cacheNuker() {
        var NUKE_VERSION = 'v1020';
        var FLAG = 'wm_cache_nuked_' + NUKE_VERSION;
        if (localStorage.getItem(FLAG)) return;

        console.log('🧨 Cache Nuker: limpiando estado viejo para', NUKE_VERSION);

        var tasks = [];

        if ('serviceWorker' in navigator) {
            tasks.push(
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    return Promise.all(regs.map(function(r) { return r.unregister(); }));
                }).catch(function(){})
            );
        }

        if (typeof caches !== 'undefined') {
            tasks.push(
                caches.keys().then(function(keys) {
                    return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                }).catch(function(){})
            );
        }

        if (typeof indexedDB !== 'undefined') {
            tasks.push(new Promise(function(resolve) {
                try {
                    var req = indexedDB.deleteDatabase('ElMaravillosoApp');
                    req.onsuccess = req.onerror = req.onblocked = function() { resolve(); };
                } catch (e) { resolve(); }
            }));
        }

        Promise.all(tasks).then(function() {
            localStorage.setItem(FLAG, Date.now().toString());
            console.log('✅ Cache Nuker: listo, recargando con código fresco...');
            location.reload();
        });
    })();
    </script>

    <!-- Critical: Dark mode init before DOM renders to prevent flash -->
    <script>
        (function () {
            if (localStorage.getItem('wm_dark_mode') === 'true') {
                // Apply immediately to <html> for instant background color
                document.documentElement.style.backgroundColor = '#0d1117';
                // Then on DOMContentLoaded, move class to body (where CSS expects it)
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.classList.add('dark-mode');
                    document.documentElement.style.backgroundColor = '';
                }, { once: true });
            }
        })();

    <!-- Service Worker desactivado: demasiados bugs históricos con caching agresivo.
         Este bloque ACTIVAMENTE desregistra cualquier SW viejo y borra sus cachés
         para curar a los usuarios que tienen un SW roto instalado. -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
                for (const r of regs) {
                    r.unregister().then(() => console.log('🧹 SW viejo desregistrado'));
                }
            }).catch(() => {});
            if (typeof caches !== 'undefined') {
                caches.keys().then((keys) => {
                    for (const k of keys) caches.delete(k).catch(() => {});
                }).catch(() => {});
            }
        }
    </script>

    <!-- Dark Mode Toggle Logic -->
    <script>
        document.getElementById('btn-toggle-dark').addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('wm_dark_mode', isDark);
            const icon = document.querySelector('#btn-toggle-dark i');
            icon.className = isDark ? 'ph ph-sun' : 'ph ph-moon';
        });
        // Set correct icon on load
        if (localStorage.getItem('wm_dark_mode') === 'true') {
            const icon = document.querySelector('#btn-toggle-dark i');
            if (icon) icon.className = 'ph ph-sun';
        }
    </script>

    <!-- Bell Button Logic -->
    <script>
        document.getElementById('btn-header-bell').addEventListener('click', async () => {
            // Navigate to Mis Tareas
            const remindersBtn = document.querySelector('[data-view="reminders"]');
            if (remindersBtn) remindersBtn.click();

            // If notifications not granted, request permission
            if ('Notification' in window && Notification.permission === 'default') {
                const granted = await window.AppNotify?.requestPermission();
                if (granted) {
                    window.AppNotify?.playChime('success');
                    window.Sync?.showToast('✅ Alertas activadas — El Maravilloso', 'success');
                }
            }
        });
    </script>
