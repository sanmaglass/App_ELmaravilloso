<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>El Maravilloso</title>
    <meta name="description" content="Sistema de gestión comercial para distribuidoras. Control de ventas, inventario, empleados y contabilidad.">
    <meta property="og:title" content="El Maravilloso — Gestión Comercial">
    <meta property="og:description" content="Sistema de gestión comercial para distribuidoras">
    <meta property="og:type" content="website">
    <meta name="robots" content="noindex, nofollow">

    <!-- Cache Nuker — MUST load first, blocking, before anything else -->
    <script src="js/cache-nuker.js?v=1063"></script>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="El Maravilloso">

    <!-- Icons -->
    <link rel="icon" type="image/png" href="assets/icon-512.png">
    <link rel="apple-touch-icon" href="assets/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-512.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.sheetjs.com">
    <!-- preload: avisa al browser que descargue la hoja de fuentes temprano -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap">
    <!-- Reducido a 3 pesos (400, 500, 700) — los más usados. display=swap ya incluido. -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web" crossorigin="anonymous" defer></script>

    <!-- QRCode.js — defer: solo se usa en vista Escáner -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" defer></script>

    <!-- Using native JS Date and Intl API for date formatting -->

    <!-- SheetJS (Excel) y jsPDF (PDF) se cargan bajo demanda vía window.lazyLoadScript() al exportar -->
    <!-- ~2.2MB que ya NO se descargan en cada arranque -->
    <!--   xlsx:    https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js -->
    <!--   jspdf:   https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js -->
    <!--   autotbl: https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js -->

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css?v=1072">
    <link rel="stylesheet" href="css/components.css?v=1072">
    <!-- Critical: Dark mode init before DOM renders to prevent flash -->
    <script src="js/dark-mode-init.js?v=1062"></script>
</head>

<body>
    <!-- SPLASH SCREEN — PRO -->
    <div id="splash-screen">
        <div id="splash-logo-wrap">
            <img src="assets/logo-dark.png" alt="El Maravilloso" id="splash-logo-img">
        </div>
        <div id="splash-app-name">El Maravilloso</div>
        <div id="splash-tagline">Tu distribuidora, bajo control</div>
        <div id="splash-status-text">Iniciando...</div>
        <div id="splash-bar-track">
            <div id="splash-bar"></div>
        </div>
        <div id="splash-version">v1.7.1</div>
    </div>


    <div class="app-container">
        <!-- Sidebar Overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand" style="justify-content:center; padding: 20px 0; display: flex; align-items: center;">
                <img src="assets/logo.png" alt="El Maravilloso" class="sidebar-logo-img">
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    <i class="ph ph-squares-four"></i>
                    <span>Resumen</span>
                </button>
                <button class="nav-item" data-view="caja_dia">
                    <i class="ph ph-cash-register"></i>
                    <span>Caja del Día</span>
                </button>
                <button class="nav-item" data-view="employees">
                    <i class="ph ph-users"></i>
                    <span>Personal</span>
                </button>

                <div style="height:1px; background:var(--border); margin:8px 16px;"></div>
                <!-- Sección Ventas -->
                <button class="nav-item" data-view="daily_sales">
                    <i class="ph ph-currency-dollar"></i>
                    <span>Cierres Diarios</span>
                </button>
                <button class="nav-item" data-view="cash_register">
                    <i class="ph ph-vault"></i>
                    <span>Arqueo de Caja</span>
                </button>
                <button class="nav-item" data-view="profit_monitor">
                    <i class="ph ph-chart-line-up"></i>
                    <span>Márgenes</span>
                </button>
                <button class="nav-item" data-view="abc_analysis">
                    <i class="ph ph-chart-pie-slice"></i>
                    <span>ABC Productos</span>
                </button>
                <button class="nav-item" data-view="intelligence">
                    <i class="ph ph-brain"></i>
                    <span>Inteligencia</span>
                </button>
                <button class="nav-item" data-view="calculator">
                    <i class="ph ph-calculator"></i>
                    <span>Costeo</span>
                </button>
                <button class="nav-item" data-view="credits" style="color:var(--danger);">
                    <i class="ph ph-hand-holding-dollar"></i>
                    <span>Créditos</span>
                </button>
                <button class="nav-item" data-view="expenses">
                    <i class="ph ph-coin"></i>
                    <span>Gastos</span>
                </button>

                <div style="height:1px; background:var(--border); margin:8px 16px;"></div>

                <!-- Sección Compras y Proveedores -->
                <button class="nav-item" data-view="suppliers">
                    <i class="ph ph-buildings"></i>
                    <span>Proveedores</span>
                </button>
                <button class="nav-item" data-view="purchase_invoices">
                    <i class="ph ph-receipt"></i>
                    <span>Facturas</span>
                </button>
                <button class="nav-item" data-view="loans">
                    <i class="ph ph-hand-coins"></i>
                    <span>Préstamos</span>
                </button>

                <div style="height:1px; background:var(--border); margin:8px 16px;"></div>

                <button class="nav-item" data-view="barcode">
                    <i class="ph ph-barcode"></i>
                    <span>Escáner</span>
                </button>

                <div style="height:1px; background:var(--border); margin:8px 16px;"></div>
                <!-- Sección Equipo -->
                <button class="nav-item" data-view="team_home">
                    <i class="ph ph-house"></i>
                    <span>Inicio Equipo</span>
                </button>
                <button class="nav-item" data-view="announcements">
                    <i class="ph ph-megaphone"></i>
                    <span>Avisos</span>
                </button>
                <button class="nav-item" data-view="team_reports">
                    <i class="ph ph-note-pencil"></i>
                    <span>Reportar</span>
                </button>
                <button class="nav-item" data-view="team_scanner">
                    <i class="ph ph-scan"></i>
                    <span>Consultar Precio</span>
                </button>
                <button class="nav-item" data-view="team_admin">
                    <i class="ph ph-clipboard-text"></i>
                    <span>Panel Equipo</span>
                </button>

                <div style="height:1px; background:var(--border); margin:8px 16px;"></div>

                <button class="nav-item" data-view="settings">
                    <i class="ph ph-gear"></i>
                    <span>Ajustes</span>
                </button>
                <div style="flex-grow:1;"></div> <!-- Spacer -->
                <button class="nav-item" data-view="logout" style="color: #ff8888; margin-top:20px;">
                    <i class="ph ph-sign-out"></i>
                    <span>Salir</span>
                </button>
            </nav>

            <div class="user-profile">
                <div class="avatar">JM</div>
                <div class="info">
                    <span class="name">Admin</span>
                    <span class="role">Gerente</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="header-left">
                    <button class="btn btn-icon mobile-toggle" id="btn-mobile-menu" aria-label="Abrir menú lateral">
                        <i class="ph ph-list"></i>
                    </button>
                    <h1 id="page-title">Resumen</h1>
                </div>
                <div class="actions">
                    <!-- Sync Indicator -->
                    <div id="sync-indicator" title="Estado de Nube"
                        style="display:flex; align-items:center; gap:6px; margin-right:12px; font-size:0.8rem; font-weight:600; color:var(--text-muted); padding:4px 8px; border-radius:12px; background:rgba(0,0,0,0.03);">
                        <i class="ph ph-cloud-slash"></i>
                        <span id="sync-text">Solo Local</span>
                    </div>

                    <button class="btn btn-icon" id="btn-toggle-privacy" title="Ocultar Montos" aria-label="Ocultar montos"><i
                            class="ph ph-eye"></i></button>
                    <button class="btn btn-icon" id="btn-toggle-dark" title="Modo Oscuro" aria-label="Cambiar modo oscuro"><i
                            class="ph ph-moon"></i></button>
                    <button class="btn btn-icon" id="btn-header-bell" title="Activar alertas" aria-label="Activar notificaciones"><i
                            class="ph ph-bell"></i></button>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Views will be injected here via JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Cargando sistema...</p>
                </div>
            </div>
        </main>
        <!-- Mobile Bottom Navigation -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="bottom-nav-item active" data-view="dashboard">
                <i class="ph ph-squares-four"></i>
                <span>Resumen</span>
            </button>
            <button class="bottom-nav-item" data-view="daily_sales">
                <i class="ph ph-currency-dollar"></i>
                <span>Cierres</span>
            </button>
            <button class="bottom-nav-item bottom-nav-scan" data-view="barcode">
                <i class="ph ph-scan"></i>
                <span>Escanear</span>
            </button>
            <button class="bottom-nav-item" data-view="credits">
                <i class="ph ph-coins"></i>
                <span>Créditos</span>
            </button>
            <button class="bottom-nav-item" id="btn-bottom-more">
                <i class="ph ph-dots-three"></i>
                <span>Más</span>
            </button>
        </nav>
        <!-- Popup menú "Más" (solo opciones no visibles en bottom nav) -->
        <div class="more-menu-overlay" id="more-menu-overlay"></div>
        <div class="more-menu" id="more-menu">
            <button class="more-menu-item" data-view="cash_register"><i class="ph ph-vault"></i><span>Caja</span></button>
            <button class="more-menu-item" data-view="employees"><i class="ph ph-users"></i><span>Personal</span></button>
            <button class="more-menu-item" data-view="expenses"><i class="ph ph-coin"></i><span>Gastos</span></button>
            <button class="more-menu-item" data-view="suppliers"><i class="ph ph-buildings"></i><span>Proveedores</span></button>
            <button class="more-menu-item" data-view="purchase_invoices"><i class="ph ph-receipt"></i><span>Facturas</span></button>
            <button class="more-menu-item" data-view="loans"><i class="ph ph-hand-coins"></i><span>Préstamos</span></button>
            <button class="more-menu-item" data-view="profit_monitor"><i class="ph ph-chart-line-up"></i><span>Márgenes</span></button>
            <button class="more-menu-item" data-view="abc_analysis"><i class="ph ph-chart-pie-slice"></i><span>ABC</span></button>
            <button class="more-menu-item" data-view="intelligence"><i class="ph ph-brain"></i><span>Inteligencia</span></button>
            <button class="more-menu-item" data-view="calculator"><i class="ph ph-calculator"></i><span>Costeo</span></button>
            <button class="more-menu-item" data-view="settings"><i class="ph ph-gear"></i><span>Ajustes</span></button>
        </div>
    </div>

    <!-- Bottom nav duplicado eliminado — el principal está arriba con class="bottom-nav" -->

    <!-- Modals Container -->
    <div id="modal-container" class="modal-backdrop hidden">
        <!-- Dynamic Modals -->
    </div>

    <!-- CDN Libs — bloqueantes, deben ir ANTES de los scripts de app que las usan -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" crossorigin="anonymous" defer></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2" crossorigin="anonymous"></script>

    <!-- App Logic (Loaded in order) -->
    <script src="js/config.js?v=1018"></script>
    <script src="js/auth.js?v=1086"></script>
    <script src="js/constants.js?v=1068"></script>
    <script src="js/utils.js?v=1086"></script>
    <script src="js/db.js?v=1086"></script>
    <script src="js/transaction-manager.js?v=1018"></script>
    <script src="js/error-logger.js?v=1086"></script>
    <!-- Sync v2: HLC + Outbox -->
    <script src="js/sync/device-id.js?v=1018"></script>
    <script src="js/sync/hlc.js?v=1085"></script>
    <script src="js/sync/outbox.js?v=1085"></script>
    <script src="js/sync/sync-v2.js?v=1068"></script>
    <!-- Legacy sync -->
    <script src="js/sync.js?v=1085"></script>
    <script src="js/sii_api.js?v=1051"></script>
    <script src="js/confirm-dialog.js?v=1057"></script>
    <!-- Views — defer: no son críticos para el primer render -->
    <script src="js/views/dashboard.js?v=1083" defer></script>
    <script src="js/views/employees.js?v=1085" defer></script>
    <script src="js/views/calculator.js?v=1020" defer></script>
    <script src="js/views/suppliers.js?v=1019" defer></script>
    <script src="js/views/purchase_invoices.js?v=1065" defer></script>
    <script src="js/views/expenses.js?v=1053" defer></script>
    <script src="js/views/daily_sales.js?v=1065" defer></script>
    <script src="js/views/sales_invoices.js?v=1066" defer></script>
    <script src="js/views/settings.js?v=1025" defer></script>
    <script src="js/views/loans.js?v=1019" defer></script>
    <script src="js/views/profit_monitor.js?v=1066" defer></script>
    <script src="js/views/cash_register.js?v=1021" defer></script>
    <script src="js/views/credits.js?v=1023" defer></script>
    <script src="js/views/abc_analysis.js?v=1001" defer></script>
    <script src="js/views/intelligence.js?v=1007" defer></script>
    <script src="js/barcode-scanner.js?v=1001" defer></script>
    <script src="js/views/barcode.js?v=1002" defer></script>
    <script src="js/views/caja_dia.js?v=1002" defer></script>
    <!-- Módulo Equipo -->
    <script src="js/views/team_home.js?v=1002" defer></script>
    <script src="js/views/announcements.js?v=1002" defer></script>
    <script src="js/views/team_reports.js?v=1002" defer></script>
    <script src="js/views/team_scanner.js?v=1002" defer></script>
    <script src="js/views/team_admin.js?v=1001" defer></script>
    <script src="js/notifications.js?v=1018" defer></script>
    <script src="js/push-subscribe.js?v=1071" defer></script>
    <!-- Main controller - MUST be last to initialize app -->
    <script src="main.js?v=1088" defer></script>

    <!-- Header buttons (dark mode toggle + bell) -->
    <script src="js/header-buttons.js?v=1062" defer></script>

</body>

</html>
