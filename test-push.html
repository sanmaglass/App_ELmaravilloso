<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Push Notification</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #161b22; padding: 32px; border-radius: 16px; text-align: center; max-width: 420px; width: 100%; }
        h1 { font-size: 1.3rem; margin: 0 0 8px; }
        p { color: #8b949e; font-size: 0.85rem; margin: 0 0 20px; }
        button { padding: 14px 28px; background: linear-gradient(135deg, #e60000, #990000); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; }
        button:hover { transform: scale(1.02); }
        button.secondary { background: #21262d; border: 1px solid #30363d; }
        #status { margin-top: 12px; font-size: 0.85rem; color: #58a6ff; min-height: 1.2em; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: #58a6ff; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.7rem; margin-top: 12px; resize: none; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Test Push Notifications</h1>
        <p>Paso 1: Suscribete en el celular. Paso 2: Copia el codigo y envialo desde el PC.</p>

        <button onclick="subscribePush()">1. Suscribir a Push</button>
        <button onclick="testLocal()" class="secondary">Test Local (sin push real)</button>

        <div id="sub-section" class="hidden">
            <textarea id="sub-json" readonly></textarea>
            <button onclick="copySub()" class="secondary">Copiar Suscripcion</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
    const VAPID_PUBLIC_KEY = 'BMbsRGjcT_5ZY4MS1efA8SPoxqvbMeuVM6GfaKNCzi3vfZ8YzPZ8HxG0wHxGlP-nzwA9bTlBuP7tAXPawFSEvuQ';

    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const rawData = atob(base64);
        const out = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) out[i] = rawData.charCodeAt(i);
        return out;
    }

    async function subscribePush() {
        const status = document.getElementById('status');
        try {
            status.textContent = 'Registrando SW...';
            const reg = await navigator.serviceWorker.register('./service-worker.js');
            await navigator.serviceWorker.ready;

            status.textContent = 'Pidiendo permiso...';
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') {
                status.textContent = 'Permiso denegado';
                status.style.color = '#f85149';
                return;
            }

            status.textContent = 'Suscribiendo a Push API...';
            let sub = await reg.pushManager.getSubscription();
            if (!sub) {
                sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });
            }

            const json = JSON.stringify(sub.toJSON(), null, 2);
            document.getElementById('sub-json').value = json;
            document.getElementById('sub-section').classList.remove('hidden');

            status.textContent = 'Suscrito! Copia el JSON y pegalo en el PC para enviar push.';
            status.style.color = '#3fb950';
        } catch (e) {
            status.textContent = 'Error: ' + e.message;
            status.style.color = '#f85149';
            console.error(e);
        }
    }

    async function testLocal() {
        const status = document.getElementById('status');
        try {
            const reg = await navigator.serviceWorker.register('./service-worker.js');
            await navigator.serviceWorker.ready;
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') { status.textContent = 'Permiso denegado'; return; }
            await reg.showNotification('Notificacion de prueba', {
                body: 'Test local — El Maravilloso',
                icon: '/assets/icon-512.png',
                badge: '/assets/icon-512.png',
                tag: 'wm-test',
                requireInteraction: true,
                vibrate: [200, 100, 200, 100, 400]
            });
            status.textContent = 'Notificacion local enviada!';
            status.style.color = '#3fb950';
        } catch (e) {
            status.textContent = 'Error: ' + e.message;
            status.style.color = '#f85149';
        }
    }

    function copySub() {
        const ta = document.getElementById('sub-json');
        ta.select();
        navigator.clipboard.writeText(ta.value).then(() => {
            document.getElementById('status').textContent = 'Copiado al portapapeles!';
        });
    }
    </script>
</body>
</html>
