<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio · El Maravilloso</title>
<style>
  :root{
    --red:#ED1C24; --red-dark:#B01018; --blue:#0066B3;
    --cream:#F5F2EC; --ink:#1c1c1e; --muted:#7a7a80;
    --card:#ffffff; --line:#e9e4da; --ok:#1f9d57; --shadow:0 6px 24px rgba(30,20,20,.08);
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Bahnschrift","Segoe UI",system-ui,sans-serif;background:var(--cream);color:var(--ink);
       -webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 22px 80px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:8px}
  header img{height:54px;width:auto;border-radius:10px}
  header .t h1{font-size:1.7rem;letter-spacing:.3px}
  header .t p{color:var(--muted);font-size:.92rem;margin-top:2px}
  .badge{margin-left:auto;background:var(--red);color:#fff;padding:8px 16px;border-radius:999px;
         font-weight:600;font-size:.85rem;box-shadow:0 4px 14px rgba(237,28,36,.3)}

  .stats{display:flex;gap:14px;margin:22px 0 8px;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 20px;flex:1;min-width:150px;
        box-shadow:var(--shadow)}
  .stat .n{font-size:1.7rem;font-weight:700;color:var(--red)}
  .stat .l{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.6px}

  h2{font-size:1.05rem;margin:34px 0 14px;display:flex;align-items:center;gap:10px}
  h2 .dot{width:9px;height:9px;border-radius:50%;background:var(--red)}
  h2 small{color:var(--muted);font-weight:400;font-size:.82rem}

  /* dropzone */
  .drop{border:2.5px dashed #d7cdbb;border-radius:var(--r);background:#fbf9f4;padding:38px;text-align:center;
        cursor:pointer;transition:.18s;position:relative}
  .drop:hover,.drop.over{border-color:var(--red);background:#fff;transform:translateY(-1px)}
  .drop .ic{font-size:2.6rem}
  .drop b{display:block;margin-top:8px;font-size:1.05rem}
  .drop span{color:var(--muted);font-size:.86rem}
  .drop input{display:none}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
        box-shadow:var(--shadow);animation:rise .4s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .thumb{aspect-ratio:1/1;background:#f0ebe1 center/cover no-repeat;position:relative}
  .card .body{padding:14px}
  .card label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin:8px 0 4px}
  .card input,.card select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:10px;font:inherit;
        font-size:.92rem;background:#fff;transition:.15s}
  .card input:focus,.card select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(237,28,36,.1)}
  .row{display:flex;gap:8px}
  .row>*{flex:1}
  .btn{border:none;border-radius:11px;padding:11px 14px;font:inherit;font-weight:600;cursor:pointer;
       transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%}
  .btn-red{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(237,28,36,.28);margin-top:12px}
  .btn-red:hover{background:var(--red-dark);transform:translateY(-1px)}
  .btn-red:disabled{opacity:.6;cursor:wait;transform:none}
  .btn-ghost{background:#f3efe7;color:var(--ink)}
  .btn-ghost:hover{background:#ece6db}

  /* posts listos */
  .post .media{position:relative;aspect-ratio:9/16;background:#000;max-height:360px;overflow:hidden}
  .post video{width:100%;height:100%;object-fit:cover;display:block}
  .post .tag{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);color:#fff;font-size:.72rem;
        padding:4px 9px;border-radius:8px;backdrop-filter:blur(4px)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;padding:4px 10px;border-radius:999px}
  .pill.listo{background:#e7f6ec;color:var(--ok)}
  .pill.prog{background:#fff2e0;color:#c47f1a}
  .pill.pub{background:#e8eefc;color:var(--blue)}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .meta .price{font-weight:700;color:var(--red);font-size:1.15rem}
  .mini{font-size:.78rem;color:var(--muted)}
  .empty{grid-column:1/-1;text-align:center;padding:46px;color:var(--muted);border:2px dashed var(--line);border-radius:var(--r)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);
        color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;opacity:0;transition:.3s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .links{display:flex;gap:8px;margin-top:10px}
  .links a{flex:1;text-align:center;font-size:.8rem;text-decoration:none;color:var(--ink);background:#f3efe7;
        padding:8px;border-radius:9px;transition:.15s}
  .links a:hover{background:#ece6db}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="/files/assets/logo.png" alt="El Maravilloso">
    <div class="t">
      <h1>Estudio de Contenido</h1>
      <p>Sube fotos → genera imagen + video → agenda y publica</p>
    </div>
    <div class="badge">El Maravilloso</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="n" id="s-listo">0</div><div class="l">Piezas listas</div></div>
    <div class="stat"><div class="n" id="s-dias">0</div><div class="l">Días de contenido</div></div>
    <div class="stat"><div class="n" id="s-prog">0</div><div class="l">Programadas</div></div>
    <div class="stat"><div class="n" id="s-pend">0</div><div class="l">Fotos por procesar</div></div>
  </div>

  <h2><span class="dot"></span>Subir fotos</h2>
  <label class="drop" id="drop">
    <div class="ic">📥</div>
    <b>Arrastra tus fotos aquí</b>
    <span>o haz clic para elegir · JPG / PNG · nombra con el producto (ej: milo.jpg)</span>
    <input type="file" id="file" multiple accept="image/*">
  </label>

  <h2><span class="dot"></span>Por procesar <small id="pend-c"></small></h2>
  <div class="grid" id="pend-grid"></div>

  <h2><span class="dot"></span>Listo para publicar <small>imagen para feed · video para TikTok/Reels</small></h2>
  <div class="grid" id="post-grid"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s), api=(u,d)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json());
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

async function load(){
  const s=await fetch('/api/state').then(r=>r.json());
  renderPending(s.entrada, s.posts);
  renderPosts(s.posts);
  const listo=s.posts.filter(p=>p.status==='listo'||p.status==='programado'||p.status==='publicado').length;
  const prog=s.posts.filter(p=>p.status==='programado').length;
  $('#s-listo').textContent=listo;
  $('#s-dias').textContent=listo; // 1 pieza ≈ 1 día
  $('#s-prog').textContent=prog;
  $('#s-pend').textContent=s.entrada.length;
  $('#pend-c').textContent=s.entrada.length?`(${s.entrada.length})`:'';
}

function guessName(f){return f.replace(/\.[^.]+$/,'').replace(/[-_]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

function renderPending(files, posts){
  const g=$('#pend-grid');
  if(!files.length){g.innerHTML='<div class="empty">No hay fotos pendientes. Sube algunas arriba 👆</div>';return;}
  g.innerHTML='';
  files.forEach((f,i)=>{
    const el=document.createElement('div');el.className='card';el.style.animationDelay=(i*40)+'ms';
    el.innerHTML=`
      <div class="thumb" style="background-image:url('/files/assets/entrada/${encodeURIComponent(f)}')"></div>
      <div class="body">
        <label>Producto</label><input value="${guessName(f)}" data-k="name">
        <div class="row">
          <div><label>Precio $</label><input type="number" placeholder="7190" data-k="price"></div>
          <div><label>Estilo</label><select data-k="style">
            <option value="premium">Premium</option><option value="clasica">Clásica</option>
          </select></div>
        </div>
        <button class="btn btn-red" data-gen>✨ Generar imagen + video</button>
      </div>`;
    el.querySelector('[data-gen]').onclick=()=>genOne(el,f);
    g.appendChild(el);
  });
}

async function genOne(el,f){
  const get=k=>el.querySelector(`[data-k="${k}"]`).value;
  const price=get('price');
  if(!price){toast('Pon el precio primero');el.querySelector('[data-k="price"]').focus();return;}
  const btn=el.querySelector('[data-gen]');btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Generando video…';
  try{
    await api('/api/generate',{filename:f,name:get('name'),price,style:get('style')});
    toast('¡Pieza lista! 🎬');
    load();
  }catch(e){toast('Error al generar');btn.disabled=false;btn.textContent='✨ Generar imagen + video';}
}

function renderPosts(posts){
  const g=$('#post-grid');
  if(!posts.length){g.innerHTML='<div class="empty">Aún no generas piezas. Procesa una foto y aparecerá aquí.</div>';return;}
  g.innerHTML='';
  posts.forEach((p,i)=>{
    const el=document.createElement('div');el.className='card post';el.style.animationDelay=(i*50)+'ms';
    const cls=p.status==='programado'?'prog':p.status==='publicado'?'pub':'listo';
    el.innerHTML=`
      <div class="media">
        <video src="/files/${p.video}" muted loop playsinline></video>
        <span class="tag">🎬 ${p.style}</span>
      </div>
      <div class="body">
        <div class="meta"><span class="price">$${Number(p.price).toLocaleString('es-CL')}</span>
          <span class="pill ${cls}">${p.status}</span></div>
        <div style="font-weight:600;margin-bottom:4px">${p.name}</div>
        <div class="row">
          <div><label>Fecha</label><input type="date" value="${p.date||''}" data-d></div>
          <div><label>Hora</label><input type="time" value="${p.time||'13:00'}" data-t></div>
        </div>
        <button class="btn btn-ghost" data-sch style="margin-top:10px">📅 Programar</button>
        <div class="links">
          <a href="/files/${p.image}" download>⬇ Imagen</a>
          <a href="/files/${p.video}" download>⬇ Video</a>
        </div>
      </div>`;
    const v=el.querySelector('video');
    el.querySelector('.media').onmouseenter=()=>v.play();
    el.querySelector('.media').onmouseleave=()=>{v.pause();v.currentTime=0;};
    el.querySelector('[data-sch]').onclick=async()=>{
      await api('/api/schedule',{slug:p.slug,date:el.querySelector('[data-d]').value,
        time:el.querySelector('[data-t]').value,status:'programado'});
      toast('Programado ✓');load();
    };
    g.appendChild(el);
  });
}

// drag & drop + upload
const drop=$('#drop'),file=$('#file');
['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over')}));
drop.addEventListener('drop',ev=>upload(ev.dataTransfer.files));
file.addEventListener('change',()=>upload(file.files));
async function upload(files){
  if(!files.length)return;
  const fd=new FormData();[...files].forEach(f=>fd.append('files',f));
  toast('Subiendo…');
  await fetch('/api/upload',{method:'POST',body:fd});
  toast('Fotos subidas ✓');load();
}
load();
</script>
</body>
</html>
